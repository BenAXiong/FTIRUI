<div class="workspace-hud" aria-hidden="false">
  <div class="workspace-hud__slot workspace-hud__slot--left">
    <div class="workspace-hud-card workspace-hud-card--primary">
      <div class="workspace-hud-card__brand">
        <span class="workspace-hud-logo" aria-hidden="true">
          <i class="bi bi-graph-up"></i>
        </span>
        <span class="workspace-hud-label">mlirui</span>
      </div>
      <div class="workspace-hud-card__title">
        <span class="workspace-canvas-title badge rounded-pill"
              data-workspace-canvas-title
              data-canvas-id="{% if active_canvas %}{{ active_canvas.id }}{% endif %}"
              {% if active_canvas %}title="Rename canvas"{% endif %}
              aria-disabled="{% if active_canvas %}false{% else %}true{% endif %}"
              role="button"
              tabindex="0">
          {% if active_canvas %}
            {{ active_canvas.title|default:"Untitled canvas" }}
          {% else %}
            Untitled canvas
          {% endif %}
        </span>
      </div>
      <div class="workspace-hud-card__actions">
        <a href="{% url 'ft:home' %}"
           class="btn btn-outline-secondary btn-sm workspace-back-btn"
           title="Return to dashboard">
          ← Dashboard
        </a>
      </div>
    </div>
  </div>
  <div class="workspace-hud__slot workspace-hud__slot--right">
    <div class="workspace-hud-card workspace-hud-card--secondary">
      <div id="user_status"
           class="user-status user-status--hud card border-0"
           role="status"
           aria-live="polite">
        <div class="user-body d-flex align-items-center gap-3">
          <div class="user-avatar hud" data-user-avatar>
            <i class="bi bi-person-circle"></i>
          </div>
          <div class="user-info text-start">
            <div class="user-primary">Guest</div>
            <div class="user-secondary text-muted">Not signed in</div>
          </div>
          <a id="user_sign_in" class="btn btn-primary btn-sm" href="/accounts/login/">Sign in</a>
          <div class="dropdown user-dropdown d-none" data-user-dropdown>
            <button class="btn btn-outline-secondary btn-sm d-flex align-items-center gap-2"
                    id="user_menu_toggle"
                    type="button"
                    data-bs-toggle="dropdown"
                    aria-expanded="false"
                    data-user-menu-toggle>
              <i class="bi bi-chevron-down small text-muted" aria-hidden="true"></i>
              <span class="visually-hidden">Open user menu</span>
            </button>
            <ul class="dropdown-menu dropdown-menu-end shadow-sm"
                aria-labelledby="user_menu_toggle">
              <li class="dropdown-header">
                <div class="fw-semibold" data-dropdown-name>Guest</div>
                <div class="text-muted small" data-dropdown-email>Not signed in</div>
              </li>
              <li>
                <a class="dropdown-item d-flex align-items-center gap-2" href="{% url 'ft:home' %}">
                  <i class="bi bi-kanban"></i>
                  <span>Go to dashboard</span>
                </a>
              </li>
              <li>
                <a class="dropdown-item d-flex align-items-center gap-2"
                   href="{% url 'ft:profile' %}"
                   data-profile-link>
                  <i class="bi bi-person-badge"></i>
                  <span>Profile</span>
                </a>
              </li>
              <li>
                <button class="dropdown-item d-flex align-items-center gap-2"
                        type="button"
                        disabled>
                  <i class="bi bi-gear"></i>
                  <span>Settings (soon)</span>
                </button>
              </li>
              <li><hr class="dropdown-divider"></li>
              <li>
                <a class="dropdown-item d-flex align-items-center gap-2 d-none"
                   id="user_sign_out"
                   href="/accounts/logout/">
                  <i class="bi bi-box-arrow-right"></i>
                  <span>Sign out</span>
                </a>
              </li>
            </ul>
          </div>
        </div>
      </div>
      <div id="autosave_indicator" class="autosave-status" role="status" aria-live="polite">
        <i class="autosave-icon bi" aria-hidden="true"></i>
        <span class="autosave-text">Autosaved</span>
      </div>
      <button id="themeToggle"
              class="btn btn-sm btn-outline-secondary workspace-hud-theme-btn"
              type="button"
              aria-label="Toggle dark mode">
        <span class="theme-icon">☀️</span>
      </button>
    </div>
  </div>
</div>
