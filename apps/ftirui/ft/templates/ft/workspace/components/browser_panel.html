<button id="c_panel_toggle" class="btn btn-sm btn-outline-secondary panel-toggle panel-toggle-float" type="button" aria-expanded="false" aria-pressed="false" title="Pin browser" aria-label="Pin browser">
  <i class="bi bi-chevron-double-right"></i>
</button>
<aside id="c_panel" class="plot-b-panel workspace-browser" aria-label="Group browser">
  <div class="panel-header panel-header--tabs" role="presentation">
    <div class="btn-group btn-group-sm workspace-browser-tabs" role="tablist" aria-label="Browser views">
      <button type="button" class="btn btn-outline-secondary workspace-browser-tab is-active" data-browser-tab="canvas" aria-selected="true" aria-controls="c_browser_tab_canvas">
        Canvas
      </button>
      <button type="button" class="btn btn-outline-secondary workspace-browser-tab" data-browser-tab="project" aria-selected="false" aria-controls="c_browser_tab_project">
        Project
      </button>
    </div>
  </div>
  <div class="panel-toolbar">
    <button id="c_panel_search_toggle" class="btn btn-sm btn-outline-secondary workspace-browser-search-toggle" type="button" title="Search canvases" aria-label="Search canvases">
      <i class="bi bi-search"></i>
    </button>
    <div class="workspace-browser-search" hidden>
      <input id="c_panel_search_input" class="form-control form-control-sm panel-search-input" type="text" placeholder="Find canvases" aria-label="Find canvases">
    </div>
    <button id="c_new_section" class="btn btn-sm btn-outline-secondary workspace-browser-canvas-only" type="button" title="New group">
      <i class="bi bi-plus-lg"></i>
    </button>
    <div class="btn-group btn-group-sm" role="group" aria-label="Browser tools">
      <div class="btn-group btn-group-sm workspace-browser-filter-group">
        <button id="c_browser_filter_btn" class="btn btn-outline-secondary workspace-browser-filter-btn" type="button" title="Filter panels" aria-label="Filter panels" data-bs-toggle="dropdown" data-bs-auto-close="outside" aria-expanded="false" aria-pressed="false">
          <i class="bi bi-funnel"></i>
        </button>
        <div class="dropdown-menu dropdown-menu-end workspace-browser-filter-menu" id="c_browser_filter_menu" aria-labelledby="c_browser_filter_btn">
          <div class="workspace-browser-filter-header">Show/hide panels</div>
          <div class="workspace-browser-filter-options">
            <label class="browser-filter-option browser-filter-option-all" for="browser_filter_all">
              <span class="browser-filter-info">
                <i class="bi bi-sliders browser-filter-icon" aria-hidden="true"></i>
                <span>All panels</span>
              </span>
              <div class="form-check form-switch mb-0">
                <input id="browser_filter_all" class="form-check-input browser-filter-toggle" type="checkbox" data-panel-type="all" checked>
              </div>
            </label>
            <label class="browser-filter-option" for="browser_filter_plot">
              <span class="browser-filter-info">
                <i class="bi bi-graph-up browser-filter-icon" aria-hidden="true"></i>
                <span>Graphs</span>
              </span>
              <div class="form-check form-switch mb-0">
                <input id="browser_filter_plot" class="form-check-input browser-filter-toggle" type="checkbox" data-panel-type="plot" checked>
              </div>
            </label>
            <label class="browser-filter-option" for="browser_filter_markdown">
              <span class="browser-filter-info">
                <i class="bi bi-markdown browser-filter-icon" aria-hidden="true"></i>
                <span>Markdown notes</span>
              </span>
              <div class="form-check form-switch mb-0">
                <input id="browser_filter_markdown" class="form-check-input browser-filter-toggle" type="checkbox" data-panel-type="markdown" checked>
              </div>
            </label>
            <label class="browser-filter-option" for="browser_filter_sheet">
              <span class="browser-filter-info">
                <i class="bi bi-table browser-filter-icon" aria-hidden="true"></i>
                <span>Spreadsheets</span>
              </span>
              <div class="form-check form-switch mb-0">
                <input id="browser_filter_sheet" class="form-check-input browser-filter-toggle" type="checkbox" data-panel-type="spreadsheet" checked>
              </div>
            </label>
            <label class="browser-filter-option" for="browser_filter_script">
              <span class="browser-filter-info">
                <i class="bi bi-journal-code browser-filter-icon" aria-hidden="true"></i>
                <span>Scripts</span>
              </span>
              <div class="form-check form-switch mb-0">
                <input id="browser_filter_script" class="form-check-input browser-filter-toggle" type="checkbox" data-panel-type="script" checked>
              </div>
            </label>
            <label class="browser-filter-option" for="browser_filter_image">
              <span class="browser-filter-info">
                <i class="bi bi-images browser-filter-icon" aria-hidden="true"></i>
                <span>Images</span>
              </span>
              <div class="form-check form-switch mb-0">
                <input id="browser_filter_image" class="form-check-input browser-filter-toggle" type="checkbox" data-panel-type="image" checked>
              </div>
            </label>
          </div>
          <div class="dropdown-divider"></div>
          <div class="dropend workspace-browser-tag-filter">
            <button class="dropdown-item dropdown-toggle" type="button" data-bs-toggle="dropdown" aria-expanded="false">
              Tags
            </button>
            <div class="dropdown-menu workspace-tech-selector-menu workspace-browser-tag-menu" data-tag-filter-menu>
              <div class="text-muted small">Loading tags…</div>
            </div>
          </div>
        </div>
      </div>
      <button id="c_browser_options_btn" class="btn btn-outline-secondary" type="button" title="Browser options" aria-label="Browser options">
        <i class="bi bi-three-dots-vertical"></i>
      </button>
    </div>
    <button id="c_project_tree_toggle" class="btn btn-sm btn-outline-secondary workspace-browser-project-only" type="button" title="Collapse all" aria-label="Collapse all" hidden>
      <i class="bi bi-chevron-bar-up"></i>
    </button>
    <button id="c_project_refresh" class="btn btn-sm btn-outline-secondary workspace-browser-project-only" type="button" title="Refresh projects" aria-label="Refresh projects" hidden>
      <i class="bi bi-arrow-clockwise"></i>
    </button>
  </div>
  <div id="c_panel_dropzone" class="panel-body" tabindex="0">
    <div id="c_browser_tab_canvas" class="workspace-browser-tab-panel is-active" data-browser-tab-panel="canvas" aria-hidden="false">
      <div class="panel-empty text-muted small">Drop files or use the toolbar to add graphs.</div>
      <div id="c_folder_tree" class="folder-tree"></div>
    </div>
    <div id="c_browser_tab_project" class="workspace-browser-tab-panel" data-browser-tab-panel="project" aria-hidden="true">
      <div class="workspace-browser-project-placeholder" data-project-placeholder>
        <i class="bi bi-diagram-3"></i>
        <div>Project explorer will appear here.</div>
      </div>
      <div id="c_project_tree" class="folder-tree workspace-project-tree" data-project-tree hidden></div>
    </div>
  </div>
</aside>
