<div class="workspace-toolbar-vertical" role="toolbar" aria-label="Technology controls">
  <div class="dropstart workspace-toolbar-tech-selector">
    <button id="tb2_tech_selector"
            class="btn btn-primary workspace-toolbar-btn workspace-toolbar-btn-hero"
            type="button"
            title="FT-IR controls"
            aria-label="FT-IR controls"
            data-bs-toggle="dropdown"
            data-bs-auto-close="outside"
            data-tech-key="ftir">
      <span class="workspace-toolbar-icon workspace-tech-symbol" aria-hidden="true" data-tech-icon-target>FT</span>
      <span class="visually-hidden" data-tech-label-target>FT-IR controls</span>
    </button>
    <div class="dropdown-menu workspace-tech-selector-menu" aria-labelledby="tb2_tech_selector" data-tech-selector-menu>
      <div class="workspace-tech-selector-grid">
        <button class="btn btn-outline-secondary workspace-toolbar-btn workspace-toolbar-btn-no-counter workspace-tech-option is-active"
                type="button"
                data-tech-option="ftir"
                data-tech-label="FT-IR"
                data-tech-symbol="FT">
          <span class="workspace-toolbar-icon workspace-tech-symbol" aria-hidden="true">FT</span>
          <span class="visually-hidden">Switch to FT-IR controls</span>
        </button>
        <button class="btn btn-outline-secondary workspace-toolbar-btn workspace-toolbar-btn-no-counter workspace-tech-option"
                type="button"
                data-tech-option="nmr"
                data-tech-label="NMR"
                data-tech-symbol="NMR">
          <span class="workspace-toolbar-icon workspace-tech-symbol" aria-hidden="true">NMR</span>
          <span class="visually-hidden">Switch to NMR controls</span>
        </button>
        <button class="btn btn-outline-secondary workspace-toolbar-btn workspace-toolbar-btn-no-counter workspace-tech-option"
                type="button"
                data-tech-option="xps"
                data-tech-label="XPS"
                data-tech-symbol="XPS">
          <span class="workspace-toolbar-icon workspace-tech-symbol" aria-hidden="true">XPS</span>
          <span class="visually-hidden">Switch to XPS controls</span>
        </button>
        <button class="btn btn-outline-secondary workspace-toolbar-btn workspace-toolbar-btn-no-counter workspace-tech-option"
                type="button"
                data-tech-option="ec"
                data-tech-label="EC"
                data-tech-symbol="EC">
          <span class="workspace-toolbar-icon workspace-tech-symbol" aria-hidden="true">EC</span>
          <span class="visually-hidden">Switch to EC controls</span>
        </button>
        <button class="btn btn-outline-secondary workspace-toolbar-btn workspace-toolbar-btn-no-counter workspace-tech-option"
                type="button"
                data-tech-option="xrd"
                data-tech-label="XRD"
                data-tech-symbol="XRD">
          <span class="workspace-toolbar-icon workspace-tech-symbol" aria-hidden="true">XRD</span>
          <span class="visually-hidden">Switch to XRD controls</span>
        </button>
        <button class="btn btn-outline-secondary workspace-toolbar-btn workspace-toolbar-btn-no-counter workspace-tech-option"
                type="button"
                data-tech-option="ups"
                data-tech-label="UPS"
                data-tech-symbol="UPS">
          <span class="workspace-toolbar-icon workspace-tech-symbol" aria-hidden="true">UPS</span>
          <span class="visually-hidden">Switch to UPS controls</span>
        </button>
        <button class="btn btn-outline-secondary workspace-toolbar-btn workspace-toolbar-btn-no-counter workspace-tech-option"
                type="button"
                data-tech-option="ms"
                data-tech-label="MS"
                data-tech-symbol="MS">
          <span class="workspace-toolbar-icon workspace-tech-symbol" aria-hidden="true">MS</span>
          <span class="visually-hidden">Switch to MS controls</span>
        </button>
        <button class="btn btn-outline-secondary workspace-toolbar-btn workspace-toolbar-btn-no-counter workspace-tech-option"
                type="button"
                data-tech-option="xxx"
                data-tech-label="XXX"
                data-tech-symbol="XXX">
          <span class="workspace-toolbar-icon workspace-tech-symbol" aria-hidden="true">XXX</span>
          <span class="visually-hidden">Switch to XXX controls</span>
        </button>
        <button class="btn btn-outline-secondary workspace-toolbar-btn workspace-toolbar-btn-no-counter workspace-tech-option"
                type="button"
                data-tech-option="yyy"
                data-tech-label="YYY"
                data-tech-symbol="YYY">
          <span class="workspace-toolbar-icon workspace-tech-symbol" aria-hidden="true">YYY</span>
          <span class="visually-hidden">Switch to YYY controls</span>
        </button>
        <button class="btn btn-outline-secondary workspace-toolbar-btn workspace-toolbar-btn-no-counter workspace-tech-option"
                type="button"
                data-tech-option="zzz"
                data-tech-label="ZZZ"
                data-tech-symbol="ZZZ">
          <span class="workspace-toolbar-icon workspace-tech-symbol" aria-hidden="true">ZZZ</span>
          <span class="visually-hidden">Switch to ZZZ controls</span>
        </button>
      </div>
    </div>
  </div>
  <div class="workspace-toolbar-delimiter workspace-toolbar-delimiter-horizontal" role="separator" aria-hidden="true"></div>
  <div class="dropstart workspace-toolbar-graph-selector">
    <button id="tb2_graph_type"
            class="btn btn-outline-secondary workspace-toolbar-btn"
            type="button"
            title="Primary graph: Line"
            aria-label="Primary graph: Line"
            data-bs-toggle="dropdown"
            data-bs-auto-close="outside"
            data-graph-key="line">
      <i class="bi bi-graph-up workspace-toolbar-icon" aria-hidden="true" data-graph-icon-target></i>
      <span class="visually-hidden" data-graph-label-target>Primary graph: Line</span>
    </button>
    <div class="dropdown-menu workspace-graph-selector-menu" aria-labelledby="tb2_graph_type" data-graph-selector-menu>
      <div class="workspace-graph-selector-section" data-graph-role="primary">
        <div class="workspace-graph-selector-grid">
          <div class="workspace-graph-option">
            <button class="btn btn-outline-secondary workspace-toolbar-btn workspace-toolbar-btn-no-counter workspace-graph-option-btn is-active"
                    type="button"
                    data-graph-option="line"
                    data-graph-label="Line"
                    data-graph-icon="bi-graph-up"
                    data-graph-role="primary">
              <i class="bi bi-graph-up workspace-toolbar-icon" aria-hidden="true"></i>
              <span class="visually-hidden">Switch to Line graph</span>
            </button>
            <span class="workspace-graph-option-label">Line</span>
          </div>
          <div class="workspace-graph-option">
            <button class="btn btn-outline-secondary workspace-toolbar-btn workspace-toolbar-btn-no-counter workspace-graph-option-btn"
                    type="button"
                    data-graph-option="scatter"
                    data-graph-label="Scatter"
                    data-graph-icon="bi-app-indicator"
                    data-graph-role="primary">
              <i class="bi bi-app-indicator workspace-toolbar-icon" aria-hidden="true"></i>
              <span class="visually-hidden">Switch to Scatter graph</span>
            </button>
            <span class="workspace-graph-option-label">Scatter</span>
          </div>
        </div>
      </div>
      <div class="workspace-graph-selector-section" data-graph-role="secondary">
        <div class="workspace-graph-selector-grid">
          <div class="workspace-graph-option">
            <button class="btn btn-outline-secondary workspace-toolbar-btn workspace-toolbar-btn-no-counter workspace-graph-option-btn"
                    type="button"
                    data-graph-option="bar"
                    data-graph-label="Bar"
                    data-graph-icon="bi-bar-chart"
                    data-graph-role="secondary">
              <i class="bi bi-bar-chart workspace-toolbar-icon" aria-hidden="true"></i>
              <span class="visually-hidden">Switch to Bar chart</span>
            </button>
            <span class="workspace-graph-option-label">Bar</span>
          </div>
          <div class="workspace-graph-option">
            <button class="btn btn-outline-secondary workspace-toolbar-btn workspace-toolbar-btn-no-counter workspace-graph-option-btn"
                    type="button"
                    data-graph-option="area"
                    data-graph-label="Area"
                    data-graph-icon="bi-collection-play"
                    data-graph-role="secondary">
              <i class="bi bi-collection-play workspace-toolbar-icon" aria-hidden="true"></i>
              <span class="visually-hidden">Switch to Area chart</span>
            </button>
            <span class="workspace-graph-option-label">Area</span>
          </div>
          <div class="workspace-graph-option">
            <button class="btn btn-outline-secondary workspace-toolbar-btn workspace-toolbar-btn-no-counter workspace-graph-option-btn"
                    type="button"
                    data-graph-option="stacked"
                    data-graph-label="Stacked"
                    data-graph-icon="bi-layers"
                    data-graph-role="secondary">
              <i class="bi bi-layers workspace-toolbar-icon" aria-hidden="true"></i>
              <span class="visually-hidden">Switch to Stacked chart</span>
            </button>
            <span class="workspace-graph-option-label">Stacked</span>
          </div>
          <div class="workspace-graph-option">
            <button class="btn btn-outline-secondary workspace-toolbar-btn workspace-toolbar-btn-no-counter workspace-graph-option-btn"
                    type="button"
                    data-graph-option="pie"
                    data-graph-label="Pie"
                    data-graph-icon="bi-pie-chart"
                    data-graph-role="secondary">
              <i class="bi bi-pie-chart workspace-toolbar-icon" aria-hidden="true"></i>
              <span class="visually-hidden">Switch to Pie chart</span>
            </button>
            <span class="workspace-graph-option-label">Pie</span>
          </div>
          <div class="workspace-graph-option">
            <button class="btn btn-outline-secondary workspace-toolbar-btn workspace-toolbar-btn-no-counter workspace-graph-option-btn"
                    type="button"
                    data-graph-option="heatmap"
                    data-graph-label="Heatmap"
                    data-graph-icon="bi-grid-3x3-gap"
                    data-graph-role="secondary">
              <i class="bi bi-grid-3x3-gap workspace-toolbar-icon" aria-hidden="true"></i>
              <span class="visually-hidden">Switch to Heatmap</span>
            </button>
            <span class="workspace-graph-option-label">Heatmap</span>
          </div>
        </div>
      </div>
    </div>
  </div>
  <div class="workspace-toolbar-delimiter workspace-toolbar-delimiter-horizontal" role="separator" aria-hidden="true"></div>
  <div class="dropstart workspace-toolbar-dropdown workspace-toolbar-peak">
    <button id="tb2_peak_marking"
            class="btn btn-outline-secondary workspace-toolbar-btn"
            type="button"
            title="Toggle peak marking"
            aria-label="Toggle peak marking"
            aria-pressed="false"
            data-bs-toggle="dropdown"
            data-bs-auto-close="outside">
      <i class="bi bi-bullseye workspace-toolbar-icon" aria-hidden="true"></i>
      <span class="visually-hidden">Toggle peak marking</span>
    </button>
    <div class="dropdown-menu workspace-toolbar-dropdown-menu workspace-toolbar-peak-menu"
         aria-labelledby="tb2_peak_marking"
         data-peak-menu>
      <div class="workspace-peak-menu-header">
        <div class="workspace-peak-menu-heading">
          <h3>Mark peaks &amp; guides</h3>
        </div>
        <div class="workspace-peak-menu-target">
          <span class="workspace-peak-menu-target-text">Mark peaks for <em data-peak-target-label>the active graph</em></span>
          <div class="form-check form-switch workspace-peak-menu-switch">
            <input class="form-check-input"
                   type="checkbox"
                   role="switch"
                   id="tb2_peak_menu_toggle"
                   aria-label="Toggle peak marking"
                   data-peak-menu-toggle>
          </div>
        </div>
      </div>
      <div class="workspace-peak-menu-grid">
        <section class="workspace-peak-menu-section" aria-label="Detection parameters">
          <header>Peak detection</header>
          <div class="workspace-peak-field">
            <label for="tb2_peak_sensitivity" class="workspace-peak-field-label">
              <span>Peak sensitivity</span>
              <i class="bi bi-info-circle workspace-peak-info"
                 aria-label="Peak sensitivity formula"
                 title="min prominence = (max-min) * (0.15 + (1 - sensitivity) * 0.35)"></i>
            </label>
            <div class="workspace-peak-field-control">
              <input id="tb2_peak_sensitivity"
                     type="range"
                     class="form-range workspace-peak-range"
                     min="0"
                     max="100"
                     value="65"
                     step="5"
                     data-peak-control="sensitivity">
              <span class="workspace-peak-field-value" data-peak-sensitivity-label>Balanced</span>
            </div>
          </div>
          <div class="workspace-peak-field">
            <label for="tb2_peak_distance">Minimum distance</label>
            <div class="workspace-peak-field-control">
              <input id="tb2_peak_distance"
                     type="range"
                     class="form-range workspace-peak-range"
                     min="0"
                     max="200"
                     value="35"
                     step="5"
                     data-peak-control="distance">
              <span class="workspace-peak-field-value" data-peak-distance-label>35 cm<sup>-1</sup></span>
            </div>
          </div>
          <div class="workspace-peak-checkbox">
            <input class="form-check-input" type="checkbox" value="1" id="tb2_peak_baseline" data-peak-control="baseline">
            <label class="form-check-label" for="tb2_peak_baseline">
              Apply quick baseline flattening
            </label>
          </div>
          <div class="workspace-peak-checkbox">
            <input class="form-check-input" type="checkbox" value="1" id="tb2_peak_smoothing" data-peak-control="smoothing" checked>
            <label class="form-check-label" for="tb2_peak_smoothing">
              Smooth trace before detection
            </label>
          </div>
          <div class="workspace-peak-menu-actions">
            <button type="button"
                    class="btn btn-outline-secondary workspace-peak-copy-btn"
                    data-peak-copy="clipboard">
              <i class="bi bi-clipboard-check me-2" aria-hidden="true"></i>
              Copy peak values
            </button>
            <button type="button"
                    class="btn btn-outline-secondary workspace-peak-spreadsheet-btn"
                    data-peak-export="spreadsheet">
              <i class="bi bi-table me-2" aria-hidden="true"></i>
              Open spreadsheet
            </button>
          </div>
        </section>
        <section class="workspace-peak-menu-section" aria-label="Display options">
          <header>Display</header>
          <div class="workspace-peak-toggle-group" role="group" aria-label="Peak overlays">
            <button type="button" class="btn btn-outline-secondary workspace-peak-toggle is-active" data-peak-visibility="markers" aria-pressed="true">
              Markers
            </button>
            <button type="button" class="btn btn-outline-secondary workspace-peak-toggle is-active" data-peak-visibility="lines" aria-pressed="true">
              Guides
            </button>
            <button type="button" class="btn btn-outline-secondary workspace-peak-toggle" data-peak-visibility="labels" aria-pressed="false">
              Labels
            </button>
          </div>
          <div class="workspace-peak-style-block">
            <span class="workspace-peak-style-label">Marker style</span>
            <div class="workspace-peak-style-grid" role="radiogroup" aria-label="Marker style">
              <button type="button" class="workspace-peak-style is-active" data-peak-marker-style="dot" aria-pressed="true">
                <span class="workspace-peak-style-preview dot" aria-hidden="true"></span>
                <span class="visually-hidden">Dot marker</span>
              </button>
              <button type="button" class="workspace-peak-style" data-peak-marker-style="triangle" aria-pressed="false">
                <span class="workspace-peak-style-preview triangle" aria-hidden="true"></span>
                <span class="visually-hidden">Triangle marker</span>
              </button>
              <button type="button" class="workspace-peak-style" data-peak-marker-style="square" aria-pressed="false">
                <span class="workspace-peak-style-preview square" aria-hidden="true"></span>
                <span class="visually-hidden">Square marker</span>
              </button>
              <button type="button" class="workspace-peak-style" data-peak-marker-style="cross" aria-pressed="false">
                <span class="workspace-peak-style-preview cross" aria-hidden="true"></span>
                <span class="visually-hidden">Cross marker</span>
              </button>
            </div>
          </div>
          <div class="workspace-peak-style-block">
            <label for="tb2_peak_label_format" class="workspace-peak-style-label">Label format</label>
            <select id="tb2_peak_label_format" class="form-select form-select-sm workspace-peak-select" data-peak-control="label-format">
              <option value="wavenumber">Wavenumber only</option>
              <option value="wavenumber-intensity">Wavenumber + intensity</option>
              <option value="wavenumber-trace">Wavenumber + trace name</option>
            </select>
          </div>
          <div class="workspace-peak-style-block">
            <label for="tb2_peak_line_style" class="workspace-peak-style-label">Guide style</label>
            <select id="tb2_peak_line_style" class="form-select form-select-sm workspace-peak-select" data-peak-control="line-style">
              <option value="solid">Solid</option>
              <option value="dashed">Dashed</option>
              <option value="dotted">Dotted</option>
            </select>
          </div>
        </section>
      </div>
    </div>
  </div>
  <button id="tb2_peak_integration" class="btn btn-outline-secondary workspace-toolbar-btn" type="button" title="Peak integration" aria-label="Peak integration">
    <i class="bi bi-clipboard-data workspace-toolbar-icon" aria-hidden="true"></i>
    <span class="visually-hidden">Peak integration</span>
  </button>
  <button id="tb2_atr_correction" class="btn btn-outline-secondary workspace-toolbar-btn" type="button" title="ATR correction" aria-label="ATR correction">
    <i class="bi bi-funnel workspace-toolbar-icon" aria-hidden="true"></i>
    <span class="visually-hidden">ATR correction</span>
  </button>
  <button id="tb2_smoothing" class="btn btn-outline-secondary workspace-toolbar-btn" type="button" title="Apply smoothing" aria-label="Apply smoothing">
    <i class="bi bi-water workspace-toolbar-icon" aria-hidden="true"></i>
    <span class="visually-hidden">Apply smoothing</span>
  </button>
  <button id="tb2_derivatization" class="btn btn-outline-secondary workspace-toolbar-btn" type="button" title="Derivatization" aria-label="Derivatization">
    <i class="bi bi-bezier workspace-toolbar-icon" aria-hidden="true"></i>
    <span class="visually-hidden">Derivatization</span>
  </button>
  <button id="tb2_spectral_library" class="btn btn-outline-secondary workspace-toolbar-btn" type="button" title="Spectral library" aria-label="Spectral library">
    <i class="bi bi-collection workspace-toolbar-icon" aria-hidden="true"></i>
    <span class="visually-hidden">Spectral library</span>
  </button>
  <button id="tb2_placeholder_help" class="btn btn-outline-secondary workspace-toolbar-btn" type="button" title="Placeholder action" aria-label="Placeholder action">
    <i class="bi bi-question-circle workspace-toolbar-icon" aria-hidden="true"></i>
    <span class="visually-hidden">Placeholder action</span>
  </button>
  <div class="workspace-toolbar-delimiter workspace-toolbar-delimiter-horizontal" role="separator" aria-hidden="true"></div>
  <div class="dropstart workspace-toolbar-dropdown">
    <button id="tb2_more_options" class="btn btn-outline-secondary workspace-toolbar-btn workspace-toolbar-btn-zero" type="button" title="More tech controls" aria-label="More tech controls" data-bs-toggle="dropdown" aria-expanded="false">
      <i class="bi bi-three-dots workspace-toolbar-icon" aria-hidden="true"></i>
      <span class="visually-hidden">More tech controls</span>
    </button>
    <ul class="dropdown-menu workspace-toolbar-dropdown-menu" aria-labelledby="tb2_more_options">
      <li>
        <button class="dropdown-item" type="button" aria-disabled="true" disabled>Placeholder option 1</button>
      </li>
      <li>
        <button class="dropdown-item" type="button" aria-disabled="true" disabled>Placeholder option 2</button>
      </li>
      <li>
        <button class="dropdown-item" type="button" aria-disabled="true" disabled>Placeholder option 3</button>
      </li>
      <li>
        <button class="dropdown-item" type="button" aria-disabled="true" disabled>Placeholder option 4</button>
      </li>
      <li>
        <button class="dropdown-item" type="button" aria-disabled="true" disabled>Placeholder option 5</button>
      </li>
      <li>
        <button class="dropdown-item" type="button" aria-disabled="true" disabled>Placeholder option 6</button>
      </li>
      <li>
        <button class="dropdown-item" type="button" aria-disabled="true" disabled>Placeholder option 7</button>
      </li>
      <li>
        <button class="dropdown-item" type="button" aria-disabled="true" disabled>Placeholder option 8</button>
      </li>
      <li>
        <button class="dropdown-item" type="button" aria-disabled="true" disabled>Placeholder option 9</button>
      </li>
      <li>
        <button class="dropdown-item" type="button" aria-disabled="true" disabled>Placeholder option 10</button>
      </li>
    </ul>
  </div>
</div>
