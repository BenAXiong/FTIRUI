<div class="workspace-toolbar-vertical" role="toolbar" aria-label="Workspace quick tools">
  <button class="btn btn-outline-secondary workspace-toolbar-btn" type="button" title="ATR correction" aria-label="ATR correction">
    <i class="bi bi-funnel workspace-toolbar-icon" aria-hidden="true"></i>
    <span class="visually-hidden">ATR correction</span>
  </button>
  <button class="btn btn-outline-secondary workspace-toolbar-btn" type="button" title="Peak integration" aria-label="Peak integration">
    <i class="bi bi-graph-up-arrow workspace-toolbar-icon" aria-hidden="true"></i>
    <span class="visually-hidden">Peak integration</span>
  </button>
  <button class="btn btn-outline-secondary workspace-toolbar-btn" type="button" title="Spectral library" aria-label="Spectral library">
    <i class="bi bi-collection workspace-toolbar-icon" aria-hidden="true"></i>
    <span class="visually-hidden">Spectral library</span>
  </button>
  <button class="btn btn-outline-secondary workspace-toolbar-btn" type="button" title="Derivatization & smoothing" aria-label="Derivatization and smoothing">
    <i class="bi bi-bezier workspace-toolbar-icon" aria-hidden="true"></i>
    <span class="visually-hidden">Derivatization and smoothing</span>
  </button>
  <button class="btn btn-outline-secondary workspace-toolbar-btn" type="button" title="Export PNG" aria-label="Export PNG">
    <i class="bi bi-file-earmark-image workspace-toolbar-icon" aria-hidden="true"></i>
    <span class="visually-hidden">Export PNG</span>
  </button>
  <button class="btn btn-outline-secondary workspace-toolbar-btn" type="button" title="Export SVG" aria-label="Export SVG">
    <i class="bi bi-filetype-svg workspace-toolbar-icon" aria-hidden="true"></i>
    <span class="visually-hidden">Export SVG</span>
  </button>
  <button class="btn btn-outline-secondary workspace-toolbar-btn" type="button" title="Move project" aria-label="Move project">
    <i class="bi bi-box-arrow-up-right workspace-toolbar-icon" aria-hidden="true"></i>
    <span class="visually-hidden">Move project</span>
  </button>
</div>
