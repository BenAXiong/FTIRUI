<div class="workspace-toolbar" role="toolbar" aria-label="Global Commands">
  <div class="btn-group btn-group-sm" role="group" aria-label="History actions">
    <button id="c_history_undo" data-history-action="undo" class="btn btn-outline-secondary workspace-toolbar-btn workspace-toolbar-btn-no-counter" type="button" title="Undo" aria-label="Undo">
      <i class="bi bi-arrow-counterclockwise workspace-toolbar-icon" aria-hidden="true"></i>
      <span class="visually-hidden">Undo</span>
    </button>
    <button id="c_history_redo" data-history-action="redo" class="btn btn-outline-secondary workspace-toolbar-btn workspace-toolbar-btn-no-counter" type="button" title="Redo" aria-label="Redo">
      <i class="bi bi-arrow-clockwise workspace-toolbar-icon" aria-hidden="true"></i>
      <span class="visually-hidden">Redo</span>
    </button>
  </div>
  <div class="workspace-toolbar-delimiter" role="separator" aria-hidden="true"></div>
  <div class="btn-group btn-group-sm" role="group" aria-label="Workspace import">
    <button id="c_canvas_browse_btn" class="btn btn-outline-secondary workspace-toolbar-btn" type="button" title="Import data" aria-label="Import data">
      <i class="bi bi-upload workspace-toolbar-icon" aria-hidden="true"></i>
      <span class="visually-hidden">Import data</span>
    </button>
    <button id="c_canvas_import_folder" class="btn btn-outline-secondary workspace-toolbar-btn" type="button" title="Import folder" aria-label="Import folder" disabled>
      <i class="bi bi-folder-symlink workspace-toolbar-icon" aria-hidden="true"></i>
      <span class="visually-hidden">Import folder</span>
    </button>
  </div>
  <div class="btn-group btn-group-sm" role="group" aria-label="Workspace documents">
    <button id="c_canvas_add_markdown" class="btn btn-outline-secondary workspace-toolbar-btn" type="button" title="Insert Markdown note" aria-label="Insert Markdown note">
      <i class="bi bi-markdown workspace-toolbar-icon" aria-hidden="true"></i>
      <span class="visually-hidden">Insert Markdown note</span>
    </button>
    <button id="c_canvas_add_sheet" class="btn btn-outline-secondary workspace-toolbar-btn" type="button" title="Add spreadsheet window" aria-label="Add spreadsheet window">
      <i class="bi bi-table workspace-toolbar-icon" aria-hidden="true"></i>
      <span class="visually-hidden">Add spreadsheet window</span>
    </button>
    <button id="c_canvas_add_script" class="btn btn-outline-secondary workspace-toolbar-btn" type="button" title="Add scripting notebook" aria-label="Add scripting notebook" disabled>
      <i class="bi bi-journal-code workspace-toolbar-icon" aria-hidden="true"></i>
      <span class="visually-hidden">Add scripting notebook</span>
    </button>
    <div class="btn-group workspace-toolbar-btn-group">
      <button id="c_canvas_add_images" class="btn btn-outline-secondary workspace-toolbar-btn workspace-toolbar-btn-dropdown" type="button" title="Add image panel" aria-label="Add image panel" data-bs-toggle="dropdown" aria-expanded="false">
        <i class="bi bi-images workspace-toolbar-icon" aria-hidden="true"></i>
        <span class="visually-hidden">Add image panel</span>
      </button>
      <ul class="dropdown-menu dropdown-menu-end workspace-toolbar-dropdown-menu" aria-labelledby="c_canvas_add_images">
        <li>
          <button class="dropdown-item" type="button" id="c_canvas_add_image_browse">
            <i class="bi bi-folder2-open"></i>
            <span>Browse files</span>
          </button>
        </li>
        <li>
          <button class="dropdown-item" type="button" id="c_canvas_add_image_drive">
            <i class="bi bi-cloud-arrow-up"></i>
            <span>Import from Drive</span>
          </button>
        </li>
        <li>
          <button class="dropdown-item" type="button" id="c_canvas_add_image_link">
            <i class="bi bi-link-45deg"></i>
            <span>Paste image URL</span>
          </button>
        </li>
      </ul>
    </div>
  </div>
  <div class="btn-group btn-group-sm" role="group" aria-label="Layout and exports">
    <button id="c_canvas_toggle_theme" class="btn btn-outline-secondary workspace-toolbar-btn" type="button" title="Change workspace theme" aria-label="Change workspace theme" disabled>
      <i class="bi bi-brightness-high workspace-toolbar-icon" aria-hidden="true"></i>
      <span class="visually-hidden">Change workspace theme</span>
    </button>
    <div class="btn-group workspace-toolbar-btn-group">
      <button id="c_canvas_align_graphs_toggle" class="btn btn-outline-secondary workspace-toolbar-btn workspace-toolbar-btn-dropdown" type="button" title="Arrange graphs" aria-label="Arrange graphs" data-bs-toggle="dropdown" aria-expanded="false">
        <i class="bi bi-layout-three-columns workspace-toolbar-icon" aria-hidden="true"></i>
        <span class="visually-hidden">Arrange graphs</span>
      </button>
      <ul class="dropdown-menu dropdown-menu-end workspace-toolbar-dropdown-menu" aria-labelledby="c_canvas_align_graphs_toggle">
        <li>
          <button class="dropdown-item" type="button" id="c_canvas_align_stack" title="Stack panels">
            <i class="bi bi-layout-sidebar-reverse"></i>
          </button>
        </li>
        <li>
          <button class="dropdown-item" type="button" id="c_canvas_align_cascade" title="Cascade panels">
            <i class="bi bi-layers"></i>
          </button>
        </li>
        <li>
          <button class="dropdown-item" type="button" id="c_canvas_align_tile" title="Tile panels">
            <i class="bi bi-grid-3x3-gap"></i>
          </button>
        </li>
      </ul>
    </div>
    <button id="c_canvas_export_all" class="btn btn-outline-secondary workspace-toolbar-btn" type="button" title="Export all plots" aria-label="Export all plots" disabled>
      <i class="bi bi-box-arrow-up-right workspace-toolbar-icon" aria-hidden="true"></i>
      <span class="visually-hidden">Export all plots</span>
    </button>
  </div>
  <div class="dropdown workspace-toolbar-dropdown">
    <button id="c_canvas_more_btn" class="btn btn-outline-secondary workspace-toolbar-btn workspace-toolbar-btn-zero" type="button" title="More workspace tools" aria-label="More workspace tools" data-bs-toggle="dropdown" aria-expanded="false">
      <i class="bi bi-three-dots workspace-toolbar-icon" aria-hidden="true"></i>
      <span class="visually-hidden">More workspace tools</span>
    </button>
    <div class="dropdown-menu dropdown-menu-end" aria-labelledby="c_canvas_more_btn">
      <button id="c_canvas_demo_btn" class="dropdown-item" type="button">
        <i class="bi bi-collection-play"></i>
        <span>Load demo files</span>
      </button>
      <button id="c_canvas_reset_layout" class="dropdown-item" type="button">
        <i class="bi bi-arrow-counterclockwise"></i>
        <span>Reset layout</span>
      </button>
      <button id="c_canvas_snapshot_manage" class="dropdown-item" type="button">
        <i class="bi bi-archive"></i>
        <span>Manage snapshots</span>
      </button>
      <div class="dropdown-divider" role="separator"></div>
      <button id="c_canvas_export_all_menu" class="dropdown-item" type="button">
        <i class="bi bi-box-arrow-up-right"></i>
        <span>Export all</span>
      </button>
    </div>
  </div>
</div>

<div class="modal fade" id="c_canvas_snapshot_modal" tabindex="-1" aria-labelledby="c_canvas_snapshot_modal_label" aria-hidden="true">
  <div class="modal-dialog modal-lg modal-dialog-scrollable">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title" id="c_canvas_snapshot_modal_label">Snapshots</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
      </div>
      <div class="modal-body">
        <div data-snapshot-empty class="text-center text-muted py-4 d-none">
          <p class="mb-0">No snapshots yet. Use &ldquo;Save snapshot&rdquo; to capture the current canvas.</p>
        </div>
        <div data-snapshot-list class="snapshot-list d-flex flex-column gap-3"></div>
      </div>
      <div class="modal-footer">
        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
      </div>
    </div>
  </div>
</div>
