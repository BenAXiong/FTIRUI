<div class="d-flex flex-wrap align-items-center gap-3 mb-3">
  <h1 class="h4 mb-0">
    <i class="bi bi-graph-up"></i> mlirui
  </h1>

  <ul class="nav nav-tabs flex-wrap" id="tabs" role="tablist">
    <li class="nav-item{% if not workspace_tab_enabled %} d-none{% endif %}">
      <button class="nav-link {% if workspace_pane_active %}active{% endif %}" id="tab-plotC" data-bs-toggle="tab" data-bs-target="#pane-plotC" type="button" role="tab">
        Workspace
      </button>
    </li>
    <li class="nav-item">
      <button class="nav-link {% if not workspace_pane_active %}active{% endif %}" data-bs-toggle="tab" data-bs-target="#dashboard" type="button">Dashboard</button>
    </li>
    <li class="nav-item"><button class="nav-link" data-bs-toggle="tab" data-bs-target="#live" type="button">Live</button></li>
    <li class="nav-item"><button class="nav-link" data-bs-toggle="tab" data-bs-target="#notes" type="button">Tools</button></li>
    <li class="nav-item"><button class="nav-link" data-bs-toggle="tab" data-bs-target="#about" type="button">About</button></li>
  </ul>

  <div class="d-flex align-items-center gap-2 ms-auto header-actions">
    <div id="user_status" class="user-status card border-0" role="status" aria-live="polite">
      <div class="user-body d-flex align-items-center gap-3">
        <div class="user-avatar placeholder">
          <i class="bi bi-person-circle"></i>
        </div>
        <div class="user-info">
          <div class="user-primary">Guest</div>
          <div class="user-secondary text-muted">Not signed in</div>
        </div>
        <div class="btn-group btn-group-sm user-actions" role="group">
          <a id="user_sign_in" class="btn btn-primary" href="/accounts/login/">Sign in</a>
          <a id="user_sign_out" class="btn btn-outline-secondary d-none" href="/accounts/logout/">Sign out</a>
        </div>
      </div>
    </div>
    <div id="autosave_indicator" class="autosave-status" role="status" aria-live="polite">
      <i class="autosave-icon bi" aria-hidden="true"></i>
      <span class="autosave-text">Autosaved</span>
    </div>
    <button id="themeToggle" class="btn btn-sm btn-outline-secondary" type="button" aria-label="Toggle dark mode">
      <span class="theme-icon">??</span>
    </button>
  </div>
</div>
