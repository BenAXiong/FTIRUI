<div class="d-flex flex-wrap align-items-center gap-3 mb-1">
  <div class="d-flex flex-wrap align-items-center gap-3">
    <h1 class="h4 mb-0">
      <i class="bi bi-graph-up"></i> sci<sup>2</sup>
    </h1>

    {% if profile_page %}
      <div class="d-flex align-items-center gap-2 ms-auto">
        <a href="{% url 'ft:home' %}" class="btn btn-outline-secondary btn-sm">
          ← Back to Dashboard
        </a>
      </div>
    {% else %}
      <ul class="nav nav-tabs flex-wrap" id="tabs" role="tablist">
        {% if initial_shell_pane == 'workspace' %}
          <li class="nav-item">
            <button class="nav-link active" id="tab-plotC" data-bs-toggle="tab" data-bs-target="#pane-plotC" type="button" role="tab">
              Workspace
            </button>
          </li>
        {% endif %}
        <li class="nav-item">
          <button class="nav-link {% if initial_shell_pane == 'dashboard' %}active{% endif %}" data-bs-toggle="tab" data-bs-target="#dashboard" type="button">Dashboard</button>
        </li>
        <li class="nav-item"><button class="nav-link" data-bs-toggle="tab" data-bs-target="#live" type="button">Live</button></li>
        <li class="nav-item"><button class="nav-link" data-bs-toggle="tab" data-bs-target="#notes" type="button">Tools</button></li>
        <li class="nav-item"><button class="nav-link" data-bs-toggle="tab" data-bs-target="#about" type="button">About</button></li>
      </ul>
    {% endif %}
    <div class="dropdown workspace-hud-menu">
      <button class="btn btn-link p-0 workspace-hud-menu__toggle"
              id="header_tools_toggle"
              type="button"
              data-bs-toggle="dropdown"
              aria-expanded="false"
              aria-label="Header tools">
        <i class="bi bi-three-dots-vertical"></i>
      </button>
      <div class="dropdown-menu workspace-hud-menu__list" aria-labelledby="header_tools_toggle" data-bs-popper="none">
        <button class="dropdown-item" type="button">Grid</button>
        <button class="dropdown-item" type="button">Shortcuts</button>
        <div class="dropdown-divider"></div>
        <div class="dropdown-item-text">
          <button id="themeToggle"
                  class="btn btn-sm btn-outline-secondary workspace-hud-theme-btn"
                  type="button"
                  aria-label="Toggle dark mode">
            <span class="theme-icon">??</span>
          </button>
        </div>
      </div>
    </div>
  </div>

  <div class="d-flex align-items-center gap-2 ms-auto header-actions">
    <button class="btn btn-sm header-action-icon" type="button" aria-label="Chat">
      <i class="bi bi-chat-dots"></i>
    </button>
    <button class="btn btn-sm header-action-icon" type="button" aria-label="Share">
      <i class="bi bi-share"></i>
    </button>
    <div id="user_status" class="user-status card border-0" role="status" aria-live="polite">
      <div class="user-body d-flex align-items-center gap-3">
        <a id="user_sign_in" class="btn btn-primary btn-sm" href="/accounts/login/">Sign in</a>
        <div class="dropdown user-dropdown d-none" data-user-dropdown>
          <button class="btn btn-sm d-flex align-items-center gap-2 workspace-user-pill" id="user_menu_toggle" type="button" data-bs-toggle="dropdown" aria-expanded="false" data-user-menu-toggle>
            <div class="user-avatar placeholder" data-user-avatar>
              <i class="bi bi-person-circle"></i>
            </div>
            <span class="workspace-plan-pill d-none" data-user-plan-pill></span>
            <i class="bi bi-chevron-down small text-muted" aria-hidden="true"></i>
            <span class="visually-hidden">Open user menu</span>
          </button>
          <ul class="dropdown-menu dropdown-menu-end shadow-sm" aria-labelledby="user_menu_toggle">
            <li>
              <a class="dropdown-item d-flex align-items-center gap-2" href="{% url 'ft:profile' %}" data-profile-link>
                <i class="bi bi-person-badge"></i>
                <span>Profile</span>
              </a>
            </li>
            <li>
              <a class="dropdown-item d-flex align-items-center gap-2 d-none" href="{% url 'ft:plans' %}" data-upgrade-link>
                <i class="bi bi-stars"></i>
                <span>Upgrade</span>
              </a>
            </li>
            <li>
              <a class="dropdown-item d-flex align-items-center gap-2 d-none" id="user_sign_out" href="/accounts/logout/">
                <i class="bi bi-box-arrow-right"></i>
                <span>Sign out</span>
              </a>
            </li>
          </ul>
        </div>
      </div>
    </div>
    <div id="autosave_indicator" class="autosave-status" role="status" aria-live="polite">
      <i class="autosave-icon bi" aria-hidden="true"></i>
      <span class="autosave-text">Autosaved</span>
    </div>
  </div>
</div>
