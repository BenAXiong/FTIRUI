{% load static %}
<!doctype html>
<html lang="en" data-bs-theme="light">
  <head>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <meta name="color-scheme" content="light dark">
    <title>{% block title %}scisci{% endblock %}</title>
    <meta name="application-name" content="scisci">
    <meta name="apple-mobile-web-app-title" content="scisci">
    <link rel="stylesheet" href="{% static 'ft/bootstrap.min.css' %}">
    <link rel="stylesheet" href="{% static 'ft/vendor/coloris/coloris.min.css' %}">
    <link rel="stylesheet" href="{% static 'ft/app.css' %}">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
    <link rel="icon" href="{% static 'ft/favicon.ico' %}">
    {% block head_extra %}{% endblock %}
    <script>
      (function() {
        const theme = localStorage.getItem('theme');
        const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
        document.documentElement.setAttribute('data-bs-theme', theme || (prefersDark ? 'dark' : 'light'));
      })();
    </script>
  </head>
  <body class="{% block body_class %}bg-body app-frame{% endblock %}"
        data-workspace-shortcut="{% if workspace_dev_shortcut_enabled %}true{% else %}false{% endif %}"
        data-workspace-tab-enabled="{% if workspace_tab_enabled %}true{% else %}false{% endif %}"
        data-workspace-route="{% url 'ft:workspace' %}"
        data-workspace-page="{% if workspace_only %}true{% else %}false{% endif %}"
        data-workspace-dev="{% if workspace_dev_active %}true{% else %}false{% endif %}"
        data-dashboard-v2="{% if dashboard_v2_enabled %}true{% else %}false{% endif %}"
        data-user-authenticated="{% if request.user.is_authenticated %}true{% else %}false{% endif %}"
        data-active-canvas-id="{% if active_canvas %}{{ active_canvas.id }}{% endif %}"
        data-active-canvas-title="{% if active_canvas %}{{ active_canvas.title|default_if_none:'' }}{% endif %}"
        data-active-canvas-primary-tag="{% if active_canvas and active_canvas.tags %}{{ active_canvas.tags.0 }}{% endif %}"
        data-requested-canvas-id="{% if requested_canvas_id %}{{ requested_canvas_id }}{% endif %}">
    <div class="container-fluid app-frame-main {% if workspace_only %}workspace-frame{% else %}py-3 px-3 px-lg-4{% endif %}">
      {% block page_header %}{% endblock %}
      {% block page_body %}{% endblock %}
    </div>

    {% block footer %}{% endblock %}

    <div class="toast-container position-fixed top-0 end-0 p-3" id="app_toasts" aria-live="polite" aria-atomic="true"></div>

    <script src="{% static 'ft/bootstrap.bundle.min.js' %}"></script>
    <script src="{% static 'ft/vendor/coloris/coloris.min.js' %}"></script>
    <script src="https://cdn.plot.ly/plotly-2.35.2.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/interactjs/dist/interact.min.js"></script>
    <script type="module" src="{% static 'ft/app.js' %}"></script>
    {% block body_scripts %}{% endblock %}
  </body>
</html>
