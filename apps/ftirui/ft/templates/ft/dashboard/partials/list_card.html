<div id="dashboard_root" class="card shadow-sm">
  <div class="card-header d-flex flex-wrap align-items-center gap-2">
    <div class="d-flex align-items-center gap-2">
      <i class="bi bi-kanban text-primary" data-dashboard-title-icon></i>
      <span class="fw-semibold" data-dashboard-title id="dashboard_main_title">All Projects</span>
      <span class="badge text-bg-warning d-none" data-dashboard-dev-indicator>Dev mode</span>
    </div>
    <div class="dashboard-header-search">
      <input id="dashboard_filter_search"
             type="search"
             class="form-control form-control-sm"
             placeholder="Find canvases"
             aria-label="Search canvases or projects" />
    </div>
    <div class="ms-auto d-flex flex-wrap gap-2 dashboard-quick-actions align-items-center">
      <div class="btn-group btn-group-sm dashboard-view-toggle" role="group" data-dashboard-view-toggle aria-label="View toggle">
        <button type="button" class="btn btn-outline-secondary active" data-view="list" title="List view">
          <i class="bi bi-table"></i>
        </button>
        <button type="button" class="btn btn-outline-secondary" data-view="gallery" title="Gallery view">
          <i class="bi bi-grid-3x3-gap"></i>
        </button>
      </div>
      <button id="dashboard_action_new_section" class="btn btn-outline-secondary btn-sm" type="button">
        <i class="bi bi-folder-plus me-1"></i>
        New folder
      </button>
      <button id="dashboard_action_new_canvas" class="btn btn-primary btn-sm" type="button">
        <i class="bi bi-plus-lg me-1"></i>
        New canvas
      </button>
      <div class="dropdown dashboard-main-options">
        <button class="btn btn-outline-secondary btn-sm" type="button" id="dashboard_main_options_btn" data-bs-toggle="dropdown" aria-expanded="false" title="More options">
          <i class="bi bi-three-dots"></i>
        </button>
        <div class="dropdown-menu dropdown-menu-end" aria-labelledby="dashboard_main_options_btn">
          <button class="dropdown-item" type="button" data-action="dashboard-toggle-thumbnails">
            <span class="me-2" data-thumb-toggle-label>Show thumbnails</span>
            <i class="bi bi-toggle-on ms-auto" data-thumb-toggle-indicator></i>
          </button>
          <button class="dropdown-item" type="button" data-action="dashboard-toggle-compact">
            Compact view
            <i class="bi bi-toggle-off ms-auto" data-compact-toggle-indicator></i>
          </button>
          <div class="dropdown-divider"></div>
          <button class="dropdown-item" type="button" data-action="dashboard-share-project">
            Share project
          </button>
          <button class="dropdown-item" type="button" data-action="dashboard-download-all">
            Download all
          </button>
          <button class="dropdown-item text-danger" type="button" data-action="dashboard-delete-project">
            Delete project
          </button>
        </div>
      </div>
    </div>
  </div>
  <div class="card-body">
    <div class="dashboard-list-view" data-dashboard-list></div>
    <div class="dashboard-gallery-view d-none" data-dashboard-gallery></div>
    <div id="dashboard_empty_state" class="dashboard-empty text-muted small text-center py-4" data-dashboard-empty role="status" aria-live="polite" aria-atomic="true">
      <p class="mb-1">No sections yet.</p>
      <p class="mb-0">Create a section to group your projects, then add canvases for each workflow.</p>
    </div>
  </div>
</div>
