name: Release

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to apply to Docker/PyInstaller artifacts (defaults to manual-<sha>)'
        required: false
  release:
    types: [published]

jobs:
  tests:
    name: Re-run test matrix
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: apps/ftirui/requirements.txt
      - name: Install Python deps
        run: pip install -r apps/ftirui/requirements.txt
      - name: Django tests
        run: python apps/ftirui/manage.py test ft
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
      - name: Install Node deps
        run: npm ci
      - name: Vitest
        run: npm run test:unit

  docker:
    name: Build & push image
    needs: tests
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    env:
      RELEASE_TAG: ${{ github.event.release.tag_name || inputs.tag || format('manual-{0}', github.sha) }}
    steps:
      - uses: actions/checkout@v4
      - name: Derive image repo
        id: image_repo
        shell: bash
        run: echo "value=$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ steps.image_repo.outputs.value }}:latest
            ghcr.io/${{ steps.image_repo.outputs.value }}:${{ env.RELEASE_TAG }}

  pyinstaller:
    name: Desktop build
    needs: tests
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install build tooling
        run: |
          pip install --upgrade pip
          pip install -r apps/ftirui/requirements.txt
          pip install pyinstaller
      - name: Build executable
        run: pyinstaller FTIR-UI.spec
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ftirui-desktop
          path: dist/
