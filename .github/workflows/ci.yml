name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  python:
    name: Django tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: apps/ftirui/requirements.txt
      - name: Install dependencies
        run: pip install -r apps/ftirui/requirements.txt
      - name: Run Django test suite
        run: python apps/ftirui/manage.py test ft

  node:
    name: Vitest unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
      - name: Install packages
        run: npm ci
      - name: Run unit tests
        run: npm run test:unit

  smoke:
    name: Playwright smoke tests
    needs: [python, node]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
      - name: Install packages
        run: npm ci
      - name: Check smoke config
        id: smoke_config
        shell: bash
        env:
          SMOKE_BASE_URL: ${{ secrets.SMOKE_BASE_URL }}
          SMOKE_USERNAME: ${{ secrets.SMOKE_USERNAME }}
          SMOKE_PASSWORD: ${{ secrets.SMOKE_PASSWORD }}
        run: |
          if [[ -n "$SMOKE_BASE_URL" && -n "$SMOKE_USERNAME" && -n "$SMOKE_PASSWORD" ]]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
          fi
      - name: Install Playwright browsers
        if: steps.smoke_config.outputs.enabled == 'true'
        run: npx playwright install --with-deps
      - name: Run smoke tests
        if: steps.smoke_config.outputs.enabled == 'true'
        run: npm run test:smoke
        env:
          SMOKE_BASE_URL: ${{ secrets.SMOKE_BASE_URL }}
          SMOKE_USERNAME: ${{ secrets.SMOKE_USERNAME }}
          SMOKE_PASSWORD: ${{ secrets.SMOKE_PASSWORD }}
      - name: Skip smoke tests
        if: steps.smoke_config.outputs.enabled != 'true'
        run: echo "Skipping smoke tests because SMOKE_* secrets are not configured."

  docker:
    name: Docker publish
    needs: [python, node]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - name: Derive image repo
        id: image_repo
        shell: bash
        run: echo "value=$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ghcr.io/${{ steps.image_repo.outputs.value }}:latest
